AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RAG Health - FGA-Governed Content Repository with Bedrock Agent (BFF Pattern)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  Auth0Domain:
    Type: String
    Default: violet-hookworm-18506.cic-demo-platform.auth0app.com
  Auth0ApiAudience:
    Type: String
    Default: https://api.rag-health.example.com
  FgaStoreId:
    Type: String
    Description: Auth0 FGA Store ID
    Default: ""
  FgaApiUrl:
    Type: String
    Description: Auth0 FGA API URL
    Default: ""
  FgaModelId:
    Type: String
    Description: Auth0 FGA Model ID
    Default: ""
  FgaClientId:
    Type: String
    Description: Auth0 FGA Client ID for API authentication
    Default: ""
  FgaClientSecret:
    Type: String
    Description: Auth0 FGA Client Secret for API authentication
    NoEcho: true
    Default: ""
  Auth0ClientId:
    Type: String
    Description: Auth0 Application Client ID (for token exchange)
    Default: ""
  Auth0ClientSecret:
    Type: String
    Description: Auth0 Application Client Secret (for token exchange)
    NoEcho: true
    Default: ""
  Auth0M2MClientId:
    Type: String
    Description: Auth0 M2M Client ID (for Management API access)
    Default: ""
  Auth0M2MClientSecret:
    Type: String
    Description: Auth0 M2M Client Secret (for Management API access)
    NoEcho: true
    Default: ""
  BedrockModelId:
    Type: String
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
  # BFF OAuth Parameters
  Auth0BFFClientId:
    Type: String
    Description: Auth0 BFF Confidential Client ID (Regular Web Application)
    Default: gYVmHq3MbrI73Uf1Qikb1ze5KfBdDLxe
  Auth0BFFClientSecret:
    Type: String
    Description: Auth0 BFF Confidential Client Secret
    NoEcho: true
    Default: ""
  FrontendOrigin:
    Type: String
    Description: Frontend origin for CORS (Amplify URL)
    Default: https://rag-health.demo-connect.us
  SessionMaxAge:
    Type: String
    Description: Session max age in seconds (24 hours default)
    Default: "86400"
  # CloudFront Custom Domain Parameters
  ApiDomainName:
    Type: String
    Description: Custom domain for API (e.g., api.rag-health.demo-connect.us)
    Default: api.rag-health.demo-connect.us
  ApiCertificateArn:
    Type: String
    Description: ACM Certificate ARN for API domain (must be in us-east-1)
    Default: ""
  LambdaFunctionUrl:
    Type: String
    Description: Lambda Function URL (without https:// and trailing /)
    Default: 5e3ecqd7qkwygbyik3fmh5qq4u0qlhul.lambda-url.us-east-1.on.aws

Globals:
  Function:
    Timeout: 120
    MemorySize: 2048
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        AUTH0_DOMAIN: !Ref Auth0Domain
        AUTH0_API_AUDIENCE: !Ref Auth0ApiAudience
        AUTH0_MYACCOUNT_AUDIENCE: !Sub "https://${Auth0Domain}/me/"
        AUTH0_JWKS_URL: !Sub "https://${Auth0Domain}/.well-known/jwks.json"
        FGA_STORE_ID: !Ref FgaStoreId
        FGA_API_URL: !Ref FgaApiUrl
        FGA_MODEL_ID: !Ref FgaModelId
        FGA_CLIENT_ID: !Ref FgaClientId
        FGA_CLIENT_SECRET: !Ref FgaClientSecret
        AUTH0_CLIENT_ID: !Ref Auth0ClientId
        AUTH0_CLIENT_SECRET: !Ref Auth0ClientSecret
        AUTH0_M2M_CLIENT_ID: !Ref Auth0M2MClientId
        AUTH0_M2M_CLIENT_SECRET: !Ref Auth0M2MClientSecret
        SUBSCRIPTIONS_TABLE_NAME: !Ref SubscriptionsTable
        S3_CONTENT_BUCKET: !Ref ContentBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        AWS_REGION_NAME: us-east-1
        # BFF OAuth Configuration
        AUTH0_BFF_CLIENT_ID: !Ref Auth0BFFClientId
        AUTH0_BFF_CLIENT_SECRET: !Ref Auth0BFFClientSecret
        FRONTEND_ORIGIN: !Ref FrontendOrigin
        SESSION_TABLE_NAME: !Ref SessionsTable
        OAUTH_STATE_TABLE_NAME: !Ref OAuthStateTable
        SESSION_MAX_AGE: !Ref SessionMaxAge
        # Custom API domain for callbacks (used if CloudFront is configured)
        API_DOMAIN: !Ref ApiDomainName

Conditions:
  HasApiCertificate: !Not [!Equals [!Ref ApiCertificateArn, ""]]

Resources:
  # DynamoDB Table for User Subscriptions
  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rag-health-subscriptions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: subscription_tier
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: subscription-tier-index
          KeySchema:
            - AttributeName: subscription_tier
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Application
          Value: rag-health
        - Key: Environment
          Value: !Ref Environment

  # DynamoDB Table for BFF Sessions
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rag-health-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Application
          Value: rag-health
        - Key: Environment
          Value: !Ref Environment

  # DynamoDB Table for OAuth State (PKCE)
  OAuthStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rag-health-oauth-state-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: state
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Application
          Value: rag-health
        - Key: Environment
          Value: !Ref Environment

  # S3 Bucket for Content Documents and FAISS Index
  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Application
          Value: rag-health
        - Key: Environment
          Value: !Ref Environment

  # RAG Agent Lambda Function (Container Image)
  # NOTE: Function URL must be added post-deploy via CLI due to org CloudFormation policy
  RagAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rag-health-agent-${Environment}"
      PackageType: Image
      Architectures:
        - x86_64
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:aws:bedrock:us-east-1::foundation-model/${BedrockModelId}"
                - "arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0"
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-*"
                - !Sub "arn:aws:bedrock:us-east-1:${AWS::AccountId}:inference-profile/*"
                - "arn:aws:bedrock:*::foundation-model/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt SubscriptionsTable.Arn
                - !Sub "${SubscriptionsTable.Arn}/index/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt SessionsTable.Arn
                - !GetAtt OAuthStateTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !GetAtt ContentBucket.Arn
                - !Sub "${ContentBucket.Arn}/*"
      Tags:
        Application: rag-health
        Environment: !Ref Environment
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ../../backend/lambda/rag-agent
      DockerTag: latest

  # CloudFront Distribution for API Custom Domain
  ApiCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasApiCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "RAG Health API - ${Environment}"
        Aliases:
          - !Ref ApiDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref ApiCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: LambdaFunctionUrl
            DomainName: !Ref LambdaFunctionUrl
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: LambdaFunctionUrl
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          Compress: true
        HttpVersion: http2
        PriceClass: PriceClass_100
      Tags:
        - Key: Application
          Value: rag-health
        - Key: Environment
          Value: !Ref Environment

Outputs:
  RagAgentFunctionName:
    Description: RAG Agent Lambda Function Name
    Value: !Ref RagAgentFunction
    Export:
      Name: !Sub "${AWS::StackName}-RagAgentFunction"

  RagAgentFunctionArn:
    Description: RAG Agent Lambda Function ARN
    Value: !GetAtt RagAgentFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RagAgentArn"

  SubscriptionsTableName:
    Description: DynamoDB Subscriptions Table Name
    Value: !Ref SubscriptionsTable
    Export:
      Name: !Sub "${AWS::StackName}-SubscriptionsTable"

  SessionsTableName:
    Description: DynamoDB Sessions Table Name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub "${AWS::StackName}-SessionsTable"

  OAuthStateTableName:
    Description: DynamoDB OAuth State Table Name
    Value: !Ref OAuthStateTable
    Export:
      Name: !Sub "${AWS::StackName}-OAuthStateTable"

  ContentBucketName:
    Description: S3 Content Bucket Name
    Value: !Ref ContentBucket
    Export:
      Name: !Sub "${AWS::StackName}-ContentBucket"

  ApiCloudFrontDomainName:
    Condition: HasApiCertificate
    Description: CloudFront Distribution Domain Name (for DNS CNAME)
    Value: !GetAtt ApiCloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-ApiCloudFrontDomain"

  ApiCustomDomain:
    Condition: HasApiCertificate
    Description: Custom API Domain
    Value: !Sub "https://${ApiDomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiCustomDomain"
