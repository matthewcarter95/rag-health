version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend/rag-health-ui
        - npm ci
    build:
      commands:
        - cd frontend/rag-health-ui
        - npm run build
  artifacts:
    baseDirectory: frontend/rag-health-ui/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/rag-health-ui/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache'
